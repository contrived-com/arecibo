name: Build and Push Arecibo Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: contrived-com/arecibo
  TRANSPONDER_IMAGE_NAME: contrived-com/arecibo-transponder

jobs:
  build-and-push-api:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Guard GHCR credentials
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: |
          [ -n "${{ secrets.GHCR_USERNAME }}" ] || { echo "Missing GHCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.GHCR_TOKEN }}" ] || { echo "Missing GHCR_TOKEN"; exit 1; }

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=test,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT=${{ github.sha }}

  build-and-push-transponder:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Guard GHCR credentials
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: |
          [ -n "${{ secrets.GHCR_USERNAME }}" ] || { echo "Missing GHCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.GHCR_TOKEN }}" ] || { echo "Missing GHCR_TOKEN"; exit 1; }

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.TRANSPONDER_IMAGE_NAME }}
          tags: |
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=test,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.transponder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            TRANSPONDER_REPOSITORY=${{ github.repository }}
            TRANSPONDER_COMMIT_SHA=${{ github.sha }}
            TRANSPONDER_COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            TRANSPONDER_WORKFLOW_RUN_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            TRANSPONDER_IMAGE_REF=${{ env.REGISTRY }}/${{ env.TRANSPONDER_IMAGE_NAME }}:${{ github.sha }}
