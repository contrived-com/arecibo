services:
  arecibo-api:
    image: ghcr.io/contrived-com/arecibo:prod
    container_name: arecibo-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8032:8080"
    volumes:
      - ./data/policies:/data/policies
      - ./data/telemetry:/data/telemetry
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - ARECIBO_VAULT_PATH=${ARECIBO_VAULT_PATH:-arecibo/config}
      - ARECIBO_API_KEYS_FIELD=${ARECIBO_API_KEYS_FIELD:-arecibo_api_keys}
      - ARECIBO_POLICY_TTL_SEC=${ARECIBO_POLICY_TTL_SEC:-60}
      - ARECIBO_POLICY_ROOT=${ARECIBO_POLICY_ROOT:-/data/policies}
      - ARECIBO_TELEMETRY_ROOT=${ARECIBO_TELEMETRY_ROOT:-/data/telemetry}
      - ARECIBO_FORCE_GO_DARK=${ARECIBO_FORCE_GO_DARK:-false}
      - ARECIBO_FORCE_GO_DARK_ON=${ARECIBO_FORCE_GO_DARK_ON:-}
    networks:
      - arecibo
      - concordia
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  arecibo-grafana:
    image: ghcr.io/contrived-com/arecibo-grafana:prod
    build:
      context: .
      dockerfile: Dockerfile.grafana
    container_name: arecibo-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3033:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-arecibo-admin}
      - GF_SECURITY_ADMIN_USER=admin
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Editor
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3033/arecibo/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_LIVE_ALLOWED_ORIGINS=${GRAFANA_LIVE_ALLOWED_ORIGINS:-https://contrived.com,https://www.contrived.com}
      - GF_NEWS_NEWS_FEED_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/fleet-overview.json
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_LOG_LEVEL=warn
    networks:
      - arecibo
      - concordia
    depends_on:
      arecibo-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/arecibo/grafana/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  arecibo:
    driver: bridge
  concordia:
    external: true
